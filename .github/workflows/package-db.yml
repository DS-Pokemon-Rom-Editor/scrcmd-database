name: Release V2 Databases

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: db-latest-release
  cancel-in-progress: false

jobs:
  package-db:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build database release package
        run: |
          mkdir -p dist/db-latest
          python - <<'PY'
          import os
          import shutil
          import zipfile
          from pathlib import Path

          revision = os.environ["GITHUB_RUN_NUMBER"]
          repo_root = Path(".")
          output_dir = repo_root / "dist" / "db-latest"
          output_zip = repo_root / "dist" / "db-latest.zip"

          v2_files = sorted(
              path for path in repo_root.rglob("*_v2.json")
              if ".git" not in path.parts and "dist" not in path.parts
          )

          if not v2_files:
              raise SystemExit("No *_v2.json files found to package.")

          (output_dir / "revision.txt").write_text(f"{revision}\n", encoding="utf-8")

          for path in v2_files:
              destination = output_dir / path
              destination.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(path, destination)

          with zipfile.ZipFile(output_zip, "w", compression=zipfile.ZIP_DEFLATED) as archive:
              for path in sorted(output_dir.rglob("*")):
                  if path.is_file():
                      archive.write(path, arcname=path.relative_to(output_dir))

          print(f"Created release archive: {output_zip}")
          print("Packaged files:")
          print(" - revision.txt")
          for path in v2_files:
              print(f" - {path}")
          PY

      - name: Update rolling release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f db-latest
          git push origin refs/tags/db-latest --force

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view db-latest >/dev/null 2>&1 || gh release create db-latest --title "db-latest" --notes "Rolling latest database release"
          gh release edit db-latest --title "db-latest" --notes "Rolling latest database release

          Revision: ${GITHUB_RUN_NUMBER}
          Commit: ${GITHUB_SHA}" --latest
          gh release upload db-latest dist/db-latest.zip --clobber
